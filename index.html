<!DOCTYPE html>
<html>

<head>
    <title>Mundial 2026</title>

    <style>
        body {
            background-color:#3b875a;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
        }

        .botao {
            background-color: #FBFF47;
            color: black;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        } 
        
        header {
            background-color:#3b875a;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
        }

        section {
            background-color:#3CB371;
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 5px #ccc;
        }
        
    </style>
</head>

<body>

 <section>
    <header id="inicio">
        <h1>Copa do Mundo 2026</h1>
    </header>
    </section>

    <p id="mensagem">Bem-vindo ao jogo!</p>

    <section id="placar">
        <h2>Gols do Brasil: <span id="numero-golos">0</span></h2>
    </section>

    <button class="botao" onclick="mostrarAlerta()">Aviso</button>

    <button class="botao" onclick="marcarGolo()">Gol!</button>

    <button class="botao" onclick="terminarJogo()">Fim do Jogo</button>

    <button class="botao" onclick="animarTorcida()">Animar Torcida</button>

    <button class="botao" onclick="modoEscuro()">Modo Escuro</button>

    <script>
        var totalGolos = 0;

        function mostrarAlerta() {
            alert("O jogo vai começar!");
        }

        function marcarGolo() {
            totalGolos = totalGolos + 1;
            document.getElementById("numero-golos").innerHTML = totalGolos;
        }

        function terminarJogo() {
            alert("O jogo terminou! Grande partida!");
        }

        function animarTorcida() {
            document.getElementById("mensagem").innerHTML =
                "Força Brasil! Rumo ao HEXA!";
        }

        function modoEscuro() {
            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";
        }
    </script>
    <section id="bandeira">
        <h2>Bandeira do Brasil</h2>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSeDWVfsToAcduM71E2M_10aLsWkhwnDka92cXubjoaag&s=10"
             width="300"
             alt="VAI BRASIL!!!">
    </section>

   
    <footer id="contato">
        <p> Isabelle e Reis! </p>
    </footer>

</body>

</html>
